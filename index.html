<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小红书爆款生成器 Pro Max - Google 广告变现版</title>
    <meta name="description" content="专为小红书打造的 AI 爆款文案生成器。一键写出超有网感的干货分享、碎碎念、避雷避坑笔记。">
    <meta name="keywords" content="小红书, AI文案, 爆款标题, 自媒体工具, 文案助手, AI写作, 流量密码">
    
    <!-- Google AdSense AMP Auto Ads Script -->
    <script async custom-element="amp-auto-ads"
            src="https://cdn.ampproject.org/v0/amp-auto-ads-0.1.js">
    </script>

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://my-first-agent.vercel.app/">
    <meta property="og:title" content="小红书爆款生成器 Pro Max - 超强 AI 文案神器">
    <meta property="og:description" content="3秒生成超强「网感」防限流笔记，Llama 3.3 强力驱动。">
    <meta property="og:image" content="/assets/og-image.png">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --primary-color: #FF2442;
            --primary-glow: rgba(255, 36, 66, 0.4);
            --bg-gradient: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            --card-bg: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --glass-blur: blur(16px);
            --radius-lg: 24px;
            --radius-md: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', 'Noto Sans SC', sans-serif; background: var(--bg-gradient); background-attachment: fixed; color: var(--text-main); min-height: 100vh; overflow-x: hidden; }
        .particles { position: fixed; inset: 0; z-index: -1; background-image: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.05) 1px, transparent 1px); background-size: 40px 40px; }
        .layout-wrapper { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        .trending-banner { display: flex; align-items: center; background: rgba(255,255,255,0.05); border: 1px solid var(--card-border); border-radius: 100px; padding: 10px 20px; margin-bottom: 30px; backdrop-filter: var(--glass-blur); }
        .trending-tag { background: var(--primary-color); color: white; padding: 4px 12px; border-radius: 50px; font-size: 12px; font-weight: 800; margin-right: 15px; }
        .trending-marquee { flex: 1; overflow: hidden; white-space: nowrap; }
        .trending-content { display: inline-block; animation: marquee 30s linear infinite; font-size: 13px; color: var(--text-muted); }
        .trending-item { cursor: pointer; transition: 0.2s; }
        .trending-item:hover { opacity: 0.7; text-decoration: underline; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .logo-wrap { display: flex; align-items: center; }
        .logo-icon { width: 60px; height: 60px; background: var(--primary-color); border-radius: 18px; display: flex; align-items: center; justify-content: center; color: white; font-size: 32px; font-weight: 900; box-shadow: 0 10px 25px var(--primary-glow); }
        .pro-badge { background: linear-gradient(90deg, #FFD700, #FFA500); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        .nav-btn { background: var(--card-bg); border: 1px solid var(--card-border); color: white; padding: 12px 24px; border-radius: 100px; cursor: pointer; font-weight: 700; backdrop-filter: var(--glass-blur); transition: 0.3s; }

        .container { display: grid; grid-template-columns: 1fr 420px; gap: 40px; }
        @media (max-width: 1000px) { .container { grid-template-columns: 1fr; } .preview-wrapper { order: -1; } }

        .glass-panel { background: var(--card-bg); border: 1px solid var(--card-border); backdrop-filter: var(--glass-blur); border-radius: var(--radius-lg); padding: 40px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: 700; color: var(--text-muted); font-size: 14px; }
        input[type="text"] { width: 100%; background: rgba(255,255,255,0.05); border: 1.5px solid var(--card-border); padding: 15px 18px; border-radius: 12px; color: white; font-size: 16px; outline: none; transition: 0.3s; }
        input[type="text"]:focus { border-color: var(--primary-color); box-shadow: 0 0 0 4px rgba(255,36,66,0.2); }
        
        .style-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        /* ... existing styles ... */
        .style-btn { display: flex; flex-direction: column; align-items: center; gap: 5px; padding: 15px 5px; background: rgba(255,255,255,0.03); border: 1px solid var(--card-border); border-radius: 12px; color: var(--text-muted); cursor: pointer; transition: 0.3s; font-size: 13px; font-weight: 700; }
        .style-btn.active { background: rgba(255,36,66,0.15); border-color: var(--primary-color); color: white; box-shadow: 0 0 15px rgba(255,36,66,0.2); }
        .range-slider { -webkit-appearance:none; appearance:none; width:100%; height:6px; background:rgba(255,255,255,0.1); border-radius:10px; outline:none; }
        .range-slider::-webkit-slider-thumb { -webkit-appearance:none; appearance:none; width:20px; height:20px; background:var(--primary-color); border-radius:50%; cursor:pointer; box-shadow:0 0 10px var(--primary-glow); }
        .generate-btn { width: 100%; padding: 22px; background: var(--primary-color); color: white; border: none; border-radius: 16px; font-size: 18px; font-weight: 900; cursor: pointer; margin-top: 20px; box-shadow: 0 10px 25px rgba(255,36,66,0.3); transition: 0.3s; }
        .generate-btn.loading { animation: pulse 1.5s infinite; pointer-events: none; }
        @keyframes pulse { 0% { opacity:1; } 50% { opacity:0.6; } 100% { opacity:1; } }

        /* Ad Slots */
        .ad-slot { margin: 20px 0; border: 1px dashed var(--card-border); border-radius: 12px; padding: 20px; background: rgba(255,255,255,0.02); display: flex; align-items: center; justify-content: center; color: var(--text-muted); cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; }
        .ad-slot:hover { border-color: var(--primary-color); background: rgba(255,255,255,0.05); }
        .ad-label { position: absolute; top: 0; right: 0; background: rgba(255,255,255,0.1); font-size: 10px; padding: 2px 8px; border-bottom-left-radius: 8px; }

        .phone-mockup { width: 375px; height: 760px; background: #000; border-radius: 54px; padding: 12px; position: relative; border: 1.5px solid rgba(255,255,255,0.1); box-shadow: 0 40px 100px rgba(0,0,0,0.5); overflow: hidden; }
        /* ... rest of existing styles ... */
        .phone-notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 150px; height: 30px; background: #000; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; z-index: 10; }
        .phone-scroll { height: 100%; background: white; border-radius: 42px; overflow-y: auto; color: #333; }
        .phone-scroll::-webkit-scrollbar { width: 0; }
        .cover-img { width: 100%; height: 375px; object-fit: cover; }
        .post-content { padding: 20px; }
        .post-title { font-size: 19px; font-weight: 900; margin-bottom: 12px; color: #000; line-height: 1.4; }
        .post-body { font-size: 15px; line-height: 1.8; white-space: pre-wrap; color: #333; }
        .post-tags { font-size: 14px; color: #135bb5; margin-top: 15px; font-weight: 700; }
        .title-switcher { background:#fff5f6; padding:12px; border-radius:12px; margin-bottom:15px; display:none; flex-direction:column; gap:8px; border:1px solid #ffe4e6; }
        .dot-group { display:flex; gap:8px; }
        .dot { width:8px; height:8px; border-radius:50%; background:#ffccd4; cursor:pointer; }
        .dot.active { width:24px; border-radius:10px; background:var(--primary-color); }
        .exporting-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.8); backdrop-filter:blur(10px); display:none; flex-direction:column; align-items:center; justify-content:center; color:white; font-weight:800; border-radius:42px; z-index:100; }
        .sidebar { position: fixed; right: 0; top: 0; width: 400px; height: 100%; background: rgba(15,23,42,0.98); backdrop-filter: blur(25px); border-left: 1px solid var(--card-border); z-index: 1000; transform: translateX(100%); transition: 0.5s; padding: 40px; display: flex; flex-direction: column; }
        .sidebar.active { transform: translateX(0); }
        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; display: none; }
        .history-list { flex:1; overflow-y:auto; margin-top:20px; }
        .history-item { background:rgba(255,255,255,0.03); border:1px solid var(--card-border); border-radius:12px; padding:15px; margin-bottom:12px; cursor:pointer; transition:0.3s; }
        .history-item:hover { border-color:var(--primary-color); background:rgba(255,255,255,0.06); }
        .action-btn { padding: 14px; border-radius: 12px; border: 1px solid var(--card-border); background: transparent; color: white; cursor: pointer; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s; }
        .action-btn.primary { background: white; color: #0f172a; border: none; }
        .toast { position:fixed; top:30px; left:50%; transform:translateX(-50%) translateY(-100px); background:white; color:#000; padding:15px 30px; border-radius:100px; z-index:2000; font-weight:800; box-shadow:0 10px 30px rgba(0,0,0,0.2); transition:0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        .toast.active { transform:translateX(-50%) translateY(0); }
        .modal { position:fixed; inset:0; z-index:2100; display:none; align-items:center; justify-content:center; padding:20px; }
        .modal-bg { position:absolute; inset:0; background:rgba(0,0,0,0.8); backdrop-filter:blur(8px); }
        .modal-content { position:relative; background:rgba(255,255,255,0.1); border:1px solid var(--card-border); border-radius:24px; padding:30px; width:100%; max-width:400px; text-align:center; box-shadow:0 20px 50px rgba(0,0,0,0.5); animation: zoomIn 0.3s; }
        @keyframes zoomIn { from { opacity:0; transform:scale(0.9); } to { opacity:1; transform:scale(1); } }
        .qr-img { width:180px; height:180px; margin:20px auto; border-radius:12px; border:4px solid white; box-shadow:0 5px 15px rgba(0,0,0,0.2); }
        .copy-chip { background:rgba(255,255,255,0.05); padding:8px 15px; border-radius:100px; border:1px solid var(--card-border); display:inline-flex; align-items:center; gap:8px; cursor:pointer; color:white; font-weight:700; margin-top:15px; transition:0.3s; }
        .copy-chip:hover { border-color:var(--primary-color); background:rgba(255,36,66,0.1); }
    </style>
</head>
<body>
    <!-- Google AdSense AMP Auto Ads Tag -->
    <amp-auto-ads type="adsense"
            data-ad-client="ca-pub-6245905201306527">
    </amp-auto-ads>

    <div class="particles"></div>
    <div class="layout-wrapper">
        <div class="trending-banner">
            <span class="trending-tag">🔥 实时热榜</span>
            <div class="trending-marquee"><div class="trending-content" id="t-marquee">加载中...</div></div>
        </div>
        <header class="header">
            <div class="logo-wrap"><div class="logo-icon">薯</div><div style="margin-left:15px"><h1>爆款生成器 <span class="pro-badge">Pro✨</span></h1><p style="color:var(--text-muted); font-size:14px">官方商业版 | 合作微信: tonybon919</p></div></div>
            <button class="nav-btn" onclick="tSidebar()">🕜 管理中心</button>
        </header>

        <main class="container">
            <div class="glass-panel">
                <div class="ad-slot" onclick="openModal()">
                    <span class="ad-label">AD 合作位-TOP</span>
                    ✨ 投放您的品牌广告，占领流量入口
                </div>
                <div class="form-group">
                    <label><span>🎯 爆款笔记主题</span><span style="font-size:12px; font-weight:400">回车键快捷生成</span></label>
                    <input type="text" id="topic" placeholder="输入你想写的主题..." onkeypress="if(event.key==='Enter')generate()">
                </div>
                <div class="form-group">
                    <label>🎭 爆款文案风格</label>
                    <div class="style-grid">
                        <button class="style-btn active" onclick="sStyle(this,'sincere-pro')">📚 纯干货</button>
                        <button class="style-btn" onclick="sStyle(this,'cute-chat')">🧸 碎碎念</button>
                        <button class="style-btn" onclick="sStyle(this,'spicy-review')">⚡ 避雷针</button>
                        <button class="style-btn" onclick="sStyle(this,'emotional-story')">📖 情感</button>
                        <button class="style-btn" onclick="sStyle(this,'plant-grass')">🌱 种草</button>
                        <button class="style-btn" onclick="sStyle(this,'vs-review')">⚖️ 测评</button>
                    </div>
                </div>
                <div class="form-group">
                    <label><span>📏 文案篇幅控制</span><span id="l-label" style="color:var(--primary-color)">标准丰富 (~300字)</span></label>
                    <input type="range" id="l-slider" class="range-slider" min="0" max="4" value="2" oninput="uLength()">
                </div>
                <button class="generate-btn" id="gen-btn" onclick="generate()">🚀 一键激发 AI 创作</button>
            </div>

            <div class="preview-wrapper">
                <div class="phone-mockup" id="target">
                    <div class="phone-notch"></div>
                    <div class="phone-scroll">
                        <img id="p-img" src="https://picsum.photos/seed/xhs/600/800" class="cover-img" alt="封面" crossorigin="anonymous">
                        <div class="post-content">
                            <div class="title-switcher" id="t-sw">
                                <span style="font-size:12px; color:var(--primary-color); font-weight:800">🏆 AI 推荐了多组爆款标题</span>
                                <div class="dot-group" id="d-group"></div>
                            </div>
                            <div class="post-title" id="p-title" contenteditable="true">在这里输出灵感...</div>
                            <div class="post-body" id="p-body" contenteditable="true">点击按钮，开启爆款之路。</div>
                            <div class="post-tags" id="p-tags" contenteditable="true">#小红书 #爆款生成器 Pro</div>
                        </div>
                    </div>
                </div>
                <div class="ad-slot" onclick="openModal()" style="margin-top:20px; border-style:solid; border-color:var(--primary-color);">
                    <span class="ad-label">AD 核心流量位</span>
                    🚀 品牌直达，高效转化
                </div>
                <button class="action-btn" style="width:100%; margin-top:20px" onclick="exportI()">📸 导出高清长图</button>
            </div>
        </main>
    </div>

    <div class="sidebar-overlay" id="o-overlay" onclick="tSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <h2 style="font-size:22px">🕜 运营管理</h2>
        <div class="ad-slot" onclick="openModal()" style="padding:15px; font-size:11px">
            🌟 原生展示广告预留位 | AdSense 已激活
        </div>
        <div class="history-list" id="h-list"></div>
        <div style="border-top:1px solid var(--card-border); padding-top:20px; margin-top:auto">
            <button class="action-btn primary" style="width:100%; margin-bottom:12px" onclick="openModal()">💼 商务合作 / 广告投放</button>
            <div style="display:flex; gap:10px">
                <button class="action-btn" style="flex:1" onclick="share('copy')">🔗 链接分享</button>
                <button class="action-btn" style="flex:1; border-color:#ef4444; color:#ef4444" onclick="clearH()">🗑️ 清空历史</button>
            </div>
        </div>
    </div>

    <!-- Business Modal -->
    <div class="modal" id="biz-modal">
        <div class="modal-bg" onclick="closeModal()"></div>
        <div class="modal-content">
            <h2 style="margin-bottom:10px">💼 商务合作</h2>
            <p style="color:var(--text-muted); font-size:14px">扫码添加官方微信或手动搜索</p>
            <img src="/assets/business-qr.png" class="qr-img" alt="商务联系二维码">
            <div class="copy-chip" onclick="copyWechat()">
                <span>🆔 微信号: <b>tonybon919</b></span>
                <span>📋</span>
            </div>
            <p style="margin-top:20px; font-size:12px; color:var(--text-muted)">广告投放 | 平台联名 | 流量置换</p>
        </div>
    </div>

    <div class="toast" id="toast"><span id="t-icon">✨</span> <span id="t-msg"></span></div>

    <script>
        const API_URL = '/api/generate';
        const lKeys = ['100','200','300','400','500'];
        const lTexts = ['极简精炼 (~100字)','简练有力 (~200字)','标准丰富 (~300字)','详实生动 (~450字)','深度长文 (~500字)'];
        let cStyle = 'sincere-pro'; let aiTitles = [];

        function uLength(){ document.getElementById('l-label').innerText = lTexts[document.getElementById('l-slider').value]; }
        function sStyle(b,s){ document.querySelectorAll('.style-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); cStyle=s; }
        function tSidebar(){ let s=document.getElementById('sidebar'); let o=document.getElementById('o-overlay'); s.classList.toggle('active'); o.style.display=s.classList.contains('active')?'block':'none'; if(s.classList.contains('active')) rHistory(); }
        function openModal(){ document.getElementById('biz-modal').style.display='flex'; }
        function closeModal(){ document.getElementById('biz-modal').style.display='none'; }
        function showT(m,i='✨'){ const t=document.getElementById('toast'); document.getElementById('t-msg').innerText=m; document.getElementById('t-icon').innerText=i; t.classList.add('active'); setTimeout(()=>t.classList.remove('active'), 3000); }
        function copyWechat(){ navigator.clipboard.writeText('tonybon919').then(()=>showT('微信号已复制','✅')); }

        async function loadN() {
            const m = document.getElementById('t-marquee'); 
            const fb = ["AI时代：流量博弈论","小红书高效笔记法则","2026变现趋势报告"];
            try {
                const res = await fetch('/api/news'); const d = await res.json();
                const items = d.items?.map(x=>x.title) || fb;
                const h = items.map(t=>`<span class="trending-item" onclick="document.getElementById('topic').value='${t}'"> &nbsp; 🔥 ${t} &nbsp; </span>`).join(' | ');
                m.innerHTML = h + h;
            } catch(e) { m.innerHTML = fb.map(t=>`<span class="trending-item" onclick="document.getElementById('topic').value='${t}'"> &nbsp; 🔥 ${t} &nbsp; </span>`).join(' | '); }
        }

        async function generate() {
            const topic = document.getElementById('topic').value; if(!topic) return showT('请输入主题','⚠️');
            const btn = document.getElementById('gen-btn'); btn.classList.add('loading'); btn.innerText='AI 计算中...';
            try {
                const res = await fetch(API_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({topic, style:cStyle, length:lKeys[document.getElementById('l-slider').value]}) });
                const d = await res.json();
                aiTitles = d.titles || [d.title]; renderT(0);
                typeW('p-body', d.body); document.getElementById('p-tags').innerText = d.tags;
                document.getElementById('p-img').src = `https://picsum.photos/seed/${Math.random()}/600/800`;
                if(aiTitles.length > 1) {
                    document.getElementById('t-sw').style.display='flex';
                    const g = document.getElementById('d-group'); g.innerHTML='';
                    aiTitles.forEach((_,i)=>{ const d=document.createElement('div'); d.className=`dot ${i===0?'active':''}`; d.onclick=()=>renderT(i); g.appendChild(d); });
                } else { document.getElementById('t-sw').style.display='none'; }
                saveH({title:aiTitles[0], body:d.body, tags:d.tags, topic, time:new Date().toLocaleTimeString()});
                showT('文案生成成功','🚀');
            } catch(e) { showT('生成失败','❌'); } finally { btn.classList.remove('loading'); btn.innerText='🚀 一键激发 AI 创作'; }
        }

        function renderT(idx) { document.getElementById('p-title').innerText = aiTitles[idx]; document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active', i===idx)); }
        function typeW(id,text) { const el = document.getElementById(id); el.innerText=""; let i=0; const timer = setInterval(()=>{ if(i<text.length){ el.innerText+=text.charAt(i); i++; } else clearInterval(timer); }, 10); }
        async function exportI() {
            const o = document.getElementById('e-overlay'); o.style.display='flex';
            try { const c = await html2canvas(document.getElementById('target'), {scale:2, useCORS:true, backgroundColor:'#fff'}); const l = document.createElement('a'); l.download=`爆款笔记_${Date.now()}.png`; l.href=c.toDataURL(); l.click(); } catch(e) { showT('导出失败','❌'); } finally { o.style.display='none'; }
        }
        function saveH(i){ let h=JSON.parse(localStorage.getItem('xhs_h')||'[]'); h.unshift(i); localStorage.setItem('xhs_h', JSON.stringify(h.slice(0,20))); }
        function rHistory() { const l = document.getElementById('h-list'); let h=JSON.parse(localStorage.getItem('xhs_h')||'[]'); l.innerHTML = h.length?h.map(x=>`<div class="history-item" onclick="loadH('${x.time}')"><b>${x.title}</b><br><small>${x.time}</small></div>`).join(''):'无记录'; }
        function loadH(t){
            let h=JSON.parse(localStorage.getItem('xhs_h')||'[]').find(x=>x.time===t);
            if(h){ aiTitles=[h.title]; renderT(0); document.getElementById('p-body').innerText=h.body; document.getElementById('p-tags').innerText=h.tags; tSidebar(); showT('记录已恢复'); }
        }
        function clearH(){ if(confirm('清空所有记录？')){ localStorage.removeItem('xhs_h'); rHistory(); } }
        function share(t){ if(t==='copy'){ navigator.clipboard.writeText(`专业 AI 爆款生成器！\n${window.location.href}`).then(()=>showT('链接已复制','📋')); } else openModal(); }
        window.onload = () => { loadN(); setInterval(loadN, 600000); };
    </script>
</body>
</html>
