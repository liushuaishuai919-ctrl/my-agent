<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小红书爆款生成器 Pro - 100大主题库+在线编辑</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-color: #FF2442;
            --primary-light: #ffebed;
            --bg-color: #f8f9fa;
            --text-color: #333;
            --secondary-text: #666;
            --white: #ffffff;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
            --radius: 20px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 1100px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 30px;
            margin-top: 40px;
        }

        @media (max-width: 950px) {
            .container {
                grid-template-columns: 1fr;
            }

            .preview-section {
                order: -1;
            }
        }

        /* 左侧编辑区 */
        .editor-section {
            background: var(--white);
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            animation: fadeIn 0.8s ease;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--primary-color);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 900;
            font-size: 20px;
        }

        h1 {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: -0.5px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            color: var(--secondary-text);
            margin-bottom: 10px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #f0f0f0;
            border-radius: 14px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--primary-color);
            background-color: #fff;
            box-shadow: 0 0 0 4px var(--primary-light);
        }

        .style-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .style-btn {
            padding: 12px;
            border: 1.5px solid #eee;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            text-align: center;
            font-weight: 500;
        }

        .style-btn.active {
            background: var(--primary-light);
            border-color: var(--primary-color);
            color: var(--primary-color);
            font-weight: 700;
        }

        .generate-btn {
            width: 100%;
            padding: 20px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 18px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 25px rgba(255, 36, 66, 0.25);
            margin-top: 10px;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(255, 36, 66, 0.35);
        }

        .generate-btn:active {
            transform: translateY(0);
        }

        .generate-btn.loading {
            pointer-events: none;
            opacity: 0.8;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.6;
            }

            100% {
                opacity: 1;
            }
        }

        /* 手机预览区 */
        .preview-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: sticky;
            top: 40px;
        }

        .phone-frame {
            width: 375px;
            height: 740px;
            background: white;
            border-radius: 45px;
            border: 12px solid #222;
            overflow: hidden;
            position: relative;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.18);
            display: flex;
            flex-direction: column;
        }

        .phone-status-bar {
            height: 44px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            font-size: 14px;
            font-weight: 700;
        }

        .phone-content {
            flex: 1;
            overflow-y: auto;
            position: relative;
        }

        .phone-content::-webkit-scrollbar {
            display: none;
        }

        .post-image {
            width: 100%;
            height: 375px;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            background-size: cover;
            background-position: center;
        }

        .post-info {
            padding: 20px;
        }

        /* 在线编辑样式 */
        .editable {
            outline: none;
            transition: background 0.2s;
            border-radius: 4px;
            padding: 2px 4px;
            border: 1px dashed transparent;
        }

        .editable:hover {
            background: rgba(255, 36, 66, 0.05);
            border-color: rgba(255, 36, 66, 0.2);
        }

        .editable:focus {
            background: rgba(255, 36, 66, 0.08);
            border-color: var(--primary-color);
        }

        .post-title {
            font-size: 19px;
            font-weight: 900;
            margin-bottom: 12px;
            line-height: 1.4;
            color: #000;
        }

        .post-body {
            font-size: 16px;
            color: #333;
            white-space: pre-wrap;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .post-tags {
            color: #507daf;
            font-size: 14px;
            margin-top: 10px;
        }

        .edit-tip {
            font-size: 12px;
            color: var(--primary-color);
            margin-bottom: 10px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .copy-actions {
            margin-top: 20px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .action-btn {
            padding: 14px;
            border: 1.5px solid #f0f0f0;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: #fafafa;
            border-color: #ddd;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- 编辑区 -->
        <div class="editor-section">
            <div class="logo">
                <div class="logo-icon">薯</div>
                <h1>爆款生成器 Pro</h1>
            </div>

            <div class="form-group">
                <label>🔥 选择/搜索 100大爆款主题</label>
                <input type="text" id="topic" list="theme-list" placeholder="搜索主题，如：护肤、职场、穿搭...">
                <datalist id="theme-list"></datalist>
            </div>

            <div class="form-group">
                <label>💡 选择文案风格</label>
                <div class="style-grid">
                    <button class="style-btn active" onclick="setStyle(this, 'dry-goods')">📚 干货分享</button>
                    <button class="style-btn" onclick="setStyle(this, 'story')">📖 情感故事</button>
                    <button class="style-btn" onclick="setStyle(this, 'review')">⭐ 种草测评</button>
                </div>
            </div>

            <div class="form-group">
                <label>🔑 核心关键词</label>
                <input type="text" id="keywords" placeholder="用空格分开。例：显瘦 高级感 OOTD">
            </div>

            <button class="generate-btn" id="generate-btn" onclick="generatePost()">
                🚀 一键生成爆款文案
            </button>

            <div class="copy-actions">
                <button class="action-btn" onclick="copyContent('title')">📄 复制标题</button>
                <button class="action-btn" onclick="copyContent('all')">🔗 复制全文</button>
            </div>
        </div>

        <!-- 预览区 -->
        <div class="preview-section">
            <div class="edit-tip">✍️ 手机屏内的文字支持在线点击修改</div>
            <div class="phone-frame">
                <div class="phone-status-bar">
                    <span>9:41</span>
                    <div style="display: flex; gap: 6px;">📶 🛜 🔋</div>
                </div>
                <div class="phone-content" id="preview-content">
                    <div class="post-image" id="preview-image">🖼️</div>
                    <div class="post-info">
                        <div class="post-title editable" id="preview-title" contenteditable="true">在这里输入主题开启灵感...</div>
                        <div class="post-body editable" id="preview-body" contenteditable="true">
                            选中左侧 100 大爆款主题库，点击生成，即可在这里看到效果。

                            支持直接点击此处进行二次编辑修改哦！✨
                        </div>
                        <div class="post-tags" id="preview-tags">#小红书爆款 #AI助手</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 100个精选热门主题
        const popularThemes = [
            "夏季微胖显瘦穿搭", "法式复古库案例", "职场新人穿搭指南", "10分钟快手早餐", "沉浸式护肤流程",
            "极简主义生活方式", "我的书单分享", "出租屋改造计划", "新手Vlog剪辑教程", "好物分享不踩雷",
            "面试避坑指南", "如何拒绝职场消耗", "时间管理大师秘籍", "平价彩妆大测评", "大厂员工真实一天",
            "考研/考公上岸心得", "独居女孩的安全感", "去黄提亮有效护肤", "拍照姿势教学", "OOTD每日穿搭",
            "宝藏旅游目的地", "周末去哪儿玩", "我的减肥餐打卡", "高效学习周计划", "情绪稳定秘籍",
            "恋爱脑清醒指南", "提升幸福感的小物", "理财小白入门课", "自媒体运营起号", "如何写出爆款标题",
            "iPad生产力工具", "英语口语速成法", "产后修复经验分享", "给20岁女孩的建议", "逆袭变美计划",
            "家装风格大搜罗", "咖啡店探店日记", "我的年度爱用物", "新手化妆零失误", "职场穿搭优雅范",
            "高质量睡眠好物", "运动补剂怎么选", "程序员脱发自救", "副业赚钱小项目", "独居美食不重样",
            "护肤成分党必看", "我的职场减压法", "提升气质的小细节", "新手养猫全攻略", "露营装备清单",
            "我的断舍离总结", "如何克服拖延症", "高效笔记系统分享", "零基础自学插画", "手机摄影调色教程",
            "室内绿植红黑榜", "职场社交礼仪", "给30岁的人生感悟", "新手理财避坑", "深夜食堂系列",
            "我的读书笔记", "如何建立自信心", "抗老精华深度评测", "日常淡妆教程", "气质穿搭公式",
            "独处时的治愈瞬间", "我是如何变自律的", "提升颜值的发型", "宿舍好物大公开", "职场穿搭避雷",
            "心理学入门书籍", "保持专注的工具", "秋季叠穿天花板", "美甲款式安利", "如何优雅地拒绝",
            "高效健身流程", "产后心理调节", "自制夏日冷饮", "早起挑战30天", "我的理财复盘",
            "职场PPT速成", "给准大一的新生建议", "我的护发心得", "如何缓解容貌焦虑", "周末一人食",
            "提升审美的电影", "高效复习经验", "皮肤屏障修复", "日常通勤装", "高情商沟通术",
            "如何发现自己的天赋", "我的职业规划", "新手烘焙入门", "提升品位的香水", "职场抗压手册",
            "保持年轻的习惯", "如何拒绝无效社交", "我的自律生活", "提升表达能力", "职场女性成长"
        ];

        // 填充 Datalist
        const datalist = document.getElementById('theme-list');
        popularThemes.forEach(theme => {
            let option = document.createElement('option');
            option.value = theme;
            datalist.appendChild(option);
        });

        let currentStyle = 'dry-goods';

        function setStyle(btn, style) {
            document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentStyle = style;
        }

        async function generatePost() {
            const topicInput = document.getElementById('topic');
            const topic = topicInput.value.trim();
            const keywords = document.getElementById('keywords').value.trim();

            if (!topic) {
                alert('请先选择或输入一个爆款主题哦～');
                topicInput.focus();
                return;
            }

            const btn = document.getElementById('generate-btn');
            btn.classList.add('loading');
            const originalBtnText = btn.innerHTML;
            btn.innerHTML = '⚡ AI 正在疯狂构思中...';

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ topic, keywords, style: currentStyle })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'AI 暂时掉线了，请稍后再试');
                }

                const data = await response.json();

                // 更新 UI
                document.getElementById('preview-title').textContent = data.title;
                document.getElementById('preview-body').textContent = data.body;
                document.getElementById('preview-tags').textContent = data.tags;

                // 随机背景
                const image = document.getElementById('preview-image');
                image.textContent = '';
                image.style.backgroundImage = `url('https://picsum.photos/seed/${Math.random()}/600/600')`;

            } catch (error) {
                console.error('Generation Error:', error);
                alert('生成失败: ' + error.message);
            } finally {
                btn.classList.remove('loading');
                btn.innerHTML = originalBtnText;
            }
        }

        function copyContent(type) {
            let text = "";
            if (type === 'title') {
                text = document.getElementById('preview-title').innerText;
            } else {
                text = document.getElementById('preview-title').innerText + "\n\n" +
                    document.getElementById('preview-body').innerText + "\n\n" +
                    document.getElementById('preview-tags').innerText;
            }

            if (!text || text.includes('主题开启灵感')) {
                alert('请先生成文案或手动编辑哦～');
                return;
            }

            navigator.clipboard.writeText(text).then(() => {
                alert('文案已在剪贴板啦，快去发布吧！✨');
            });
        }
    </script>
</body>

</html>
