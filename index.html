<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小红书爆款生成器 Pro Max - 行业领先 AI 驱动</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-color: #FF2442;
            --primary-light: #ffebed;
            --bg-color: #f8f9fa;
            --text-color: #333;
            --secondary-text: #666;
            --white: #ffffff;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            --radius: 24px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 40px;
            margin-top: 20px;
        }

        @media (max-width: 1000px) {
            .container {
                grid-template-columns: 1fr;
            }

            .preview-section {
                order: -1;
            }
        }

        /* 左侧编辑区 */
        .editor-section {
            background: var(--white);
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            animation: fadeIn 0.8s ease;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: var(--primary-color);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 900;
            font-size: 24px;
        }

        h1 {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -0.5px;
        }

        .form-group {
            margin-bottom: 5px;
        }

        label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 700;
            color: var(--secondary-text);
            margin-bottom: 10px;
        }

        .label-hint {
            font-weight: 400;
            font-size: 12px;
            color: #999;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 16px;
            border: 2px solid #f2f2f2;
            border-radius: 16px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--primary-color);
            background-color: #fff;
            box-shadow: 0 0 0 4px var(--primary-light);
        }

        /* 滑块样式 */
        .slider-container {
            padding: 10px 0;
        }

        .range-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: #eee;
            outline: none;
            transition: 0.2s;
        }

        .range-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--primary-color);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 36, 66, 0.3);
        }

        .style-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .style-btn {
            padding: 14px;
            border: 1.5px solid #eee;
            border-radius: 14px;
            background: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            text-align: center;
            font-weight: 600;
        }

        .style-btn.active {
            background: var(--primary-light);
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .generate-btn {
            width: 100%;
            padding: 22px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 12px 30px rgba(255, 36, 66, 0.2);
            margin-top: 10px;
        }

        .generate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 18px 40px rgba(255, 36, 66, 0.3);
        }

        .generate-btn.loading {
            pointer-events: none;
            opacity: 0.8;
            animation: breathe 1.5s infinite;
        }

        @keyframes breathe {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(0.98);
                opacity: 0.7;
            }

            100% {
                transform: scale(1);
            }
        }

        /* 手机预览区 */
        .preview-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: sticky;
            top: 20px;
        }

        .phone-frame {
            width: 375px;
            height: 780px;
            background: white;
            border-radius: 50px;
            border: 12px solid #1a1a1a;
            overflow: hidden;
            position: relative;
            box-shadow: 0 60px 120px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
        }

        .phone-status-bar {
            height: 44px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 35px;
            font-size: 14px;
            font-weight: 700;
        }

        .phone-content {
            flex: 1;
            overflow-y: auto;
            background: #fff;
        }

        .phone-content::-webkit-scrollbar {
            display: none;
        }

        .post-image {
            width: 100%;
            height: 375px;
            background: #f9f9f9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            background-size: cover;
            background-position: center;
        }

        .post-info {
            padding: 20px;
        }

        /* 标题多版本切换 */
        .title-switcher {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fdf2f3;
            padding: 8px 12px;
            border-radius: 10px;
            margin-bottom: 12px;
            font-size: 12px;
            color: var(--primary-color);
            font-weight: 700;
        }

        .switch-dot-group {
            display: flex;
            gap: 6px;
        }

        .switch-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ffccd4;
            cursor: pointer;
            transition: all 0.3s;
        }

        .switch-dot.active {
            width: 24px;
            border-radius: 10px;
            background: var(--primary-color);
        }

        .post-title {
            font-size: 20px;
            font-weight: 900;
            margin-bottom: 14px;
            line-height: 1.4;
            color: #000;
            outline: none;
        }

        .post-body {
            font-size: 16px;
            color: #333;
            white-space: pre-wrap;
            margin-bottom: 24px;
            line-height: 1.7;
            outline: none;
        }

        .post-tags {
            color: #507daf;
            font-size: 14px;
            margin-top: 15px;
        }

        .editable:hover {
            background: rgba(255, 36, 66, 0.05);
        }

        /* 底部交互 */
        .copy-actions {
            margin-top: 25px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .action-btn {
            padding: 16px;
            border: 2px solid #f0f0f0;
            background: white;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 800;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: #fafafa;
            border-color: #eee;
            transform: translateY(-2px);
        }

        .action-btn.primary {
            background: var(--primary-color);
            color: white;
            border: none;
        }

        /* 敏感词检测样式 */
        .danger-tag {
            border-bottom: 2px dashed #f00;
            cursor: help;
            background: #fff1f1;
        }

        .sensitive-panel {
            background: #fff8f8;
            border: 1px solid #ffebeb;
            padding: 15px;
            border-radius: 16px;
            margin-top: 20px;
            display: none;
        }

        .sensitive-panel.active {
            display: block;
            animation: slideIn 0.3s ease;
        }

        .risk-item {
            display: inline-block;
            background: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin: 4px;
            border: 1px solid #ffccd4;
            color: #f00;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 历史记录侧边栏 */
        .history-sidebar {
            position: fixed;
            right: -320px;
            top: 0;
            width: 320px;
            height: 100%;
            background: white;
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            padding: 30px;
        }

        .history-sidebar.active {
            right: 0;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
        }

        .history-item {
            padding: 15px;
            border: 1.5px solid #f5f5f5;
            border-radius: 12px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .history-item:hover {
            border-color: var(--primary-color);
            background: var(--primary-light);
            transform: scale(1.02);
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(4px);
            z-index: 999;
            display: none;
        }

        .sidebar-overlay.active {
            display: block;
        }

        .history-btn {
            background: #f0f0f0;
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .history-btn:hover {
            background: #e0e0e0;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- 编辑区 -->
        <div class="editor-section">
            <div class="logo" style="justify-content: space-between;">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <div class="logo-icon">薯</div>
                    <h1>爆款生成器 Pro Max</h1>
                </div>
                <button class="history-btn" onclick="toggleHistorySidebar()">🕜 历史灵感</button>
            </div>

            <div class="form-group">
                <label>
                    🔥 爆款主题建议
                    <span class="label-hint">100个精选主题已载入</span>
                </label>
                <input type="text" id="topic" list="theme-list" placeholder="搜索主题，例如：职场新人避坑...">
                <datalist id="theme-list"></datalist>
            </div>

            <div class="form-group">
                <label>📚 文案风格</label>
                <div class="style-grid">
                    <button class="style-btn active" onclick="setStyle(this, 'dry-goods')">干货分享</button>
                    <button class="style-btn" onclick="setStyle(this, 'story')">情感故事</button>
                    <button class="style-btn" onclick="setStyle(this, 'review')">种草测评</button>
                </div>
            </div>

            <div class="form-group slider-container">
                <label>
                    📏 文案字数控制
                    <span id="length-label">标准丰富 (~300字)</span>
                </label>
                <input type="range" id="length-slider" class="range-slider" min="0" max="2" value="1" step="1"
                    oninput="updateLengthLabel()">
            </div>

            <div class="form-group">
                <label>🔑 核心关键词</label>
                <input type="text" id="keywords" placeholder="添加特色关键词，AI 生成更精准">
            </div>

            <button class="generate-btn" id="generate-btn" onclick="generatePost()">
                🚀 激发 AI 生成爆款
            </button>

            <button class="action-btn" onclick="checkSensitiveWords()">
                🛡️ 敏感词“避雷”检测
            </button>

            <div id="sensitive-panel" class="sensitive-panel">
                <div style="font-size: 14px; font-weight: 800; margin-bottom: 10px; color: #f00;">⚠️ 风险词预警：</div>
                <div id="risk-list"></div>
                <div style="font-size: 11px; color: #999; margin-top: 10px;">建议修改以上词汇，以免触发平台限流。</div>
            </div>

            <div class="copy-actions">
                <button class="action-btn" onclick="copyContent('title')">📄 仅复制标题</button>
                <button class="action-btn primary" onclick="copyContent('all')">🔗 一键复制全文</button>
            </div>
        </div>

        <!-- 预览区 -->
        <div class="preview-section">
            <div class="phone-frame">
                <div class="phone-status-bar">
                    <span>9:41</span>
                    <div style="display: flex; gap: 8px;">📶 🛜 🔋</div>
                </div>
                <div class="phone-content">
                    <div class="post-image" id="preview-image">📷</div>
                    <div class="post-info">
                        <!-- 标题三选一 -->
                        <div id="title-switcher-ui" class="title-switcher" style="display: none;">
                            <span>🏆 AI 爆款多版本建议</span>
                            <div class="switch-dot-group" id="dot-group"></div>
                        </div>

                        <div class="post-title editable" id="preview-title" contenteditable="true">在这里输出灵感...</div>
                        <div class="post-body editable" id="preview-body" contenteditable="true">
                            输入主题，选择风格，点击“激发 AI”。

                            由业界领先的 Llama-3.3 大模型强力驱动，为您提供最具“网感”的创作支持。⚡
                        </div>
                        <div class="post-tags" id="preview-tags">#小红书 #爆款生成器</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 历史记录侧边栏 -->
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleHistorySidebar()"></div>
    <div class="history-sidebar" id="history-sidebar">
        <div class="history-header">
            <h3>🕜 历史灵感记录</h3>
            <button onclick="clearHistory()"
                style="border: none; background: none; color: #999; cursor: pointer; font-size: 12px;">清空全部</button>
        </div>
        <div class="history-list" id="history-list">
            <!-- 历史记录将注入此处 -->
        </div>
        <button class="action-btn" onclick="toggleHistorySidebar()" style="margin-top: 20px; width: 100%;">关闭</button>
    </div>

    <script>
        const popularThemes = [
            "夏季微胖显瘦穿搭", "法式复古好物", "10分钟快手早餐", "沉浸式护肤", "极简生活", "我的书单",
            "考研/考公上岸心得", "独居女孩安全感", "自媒体运营起号", "面试避坑指南", "高质量睡眠好物"
            // ... (更多主题已内置在后端逻辑)
        ];

        const datalist = document.getElementById('theme-list');
        popularThemes.forEach(t => { const op = document.createElement('option'); op.value = t; datalist.appendChild(op); });

        let currentStyle = 'dry-goods';
        let aiTitles = []; // 存储生成的 3 个标题
        const lengths = ['short', 'medium', 'long'];
        const lengthTexts = ['短小精悍 (~100字)', '标准丰富 (~300字)', '细节详实 (~500字)'];

        function setStyle(btn, style) {
            document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentStyle = style;
        }

        function updateLengthLabel() {
            const val = document.getElementById('length-slider').value;
            document.getElementById('length-label').textContent = lengthTexts[val];
        }

        async function generatePost() {
            const topicInput = document.getElementById('topic');
            const topic = topicInput.value.trim();
            const keywords = document.getElementById('keywords').value.trim();
            if (!topic) { alert('请输入主题再激发 AI 灵感哦！'); return; }

            const btn = document.getElementById('generate-btn');
            btn.classList.add('loading');
            btn.innerHTML = '⚡ AI 正在疯狂刷爆款...';

            // 预清空
            document.getElementById('preview-title').textContent = "正在生成中...";
            document.getElementById('preview-body').textContent = "AI 文案师正在为您构思内容...\n添加 Emoji ✨...\n优化标题党逻辑 🔥...";
            document.getElementById('sensitive-panel').classList.remove('active');

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        topic,
                        keywords,
                        style: currentStyle,
                        length: lengths[document.getElementById('length-slider').value]
                    })
                });

                if (!response.ok) throw new Error('生成失败');
                const data = await response.json();

                aiTitles = data.titles || [data.title];
                renderTitle(0);
                document.getElementById('preview-body').textContent = data.body;
                document.getElementById('preview-tags').textContent = data.tags;

                // 随机背景图
                document.getElementById('preview-image').style.backgroundImage = `url('https://picsum.photos/seed/${Math.random()}/600/600')`;

                // 渲染切换点
                const dotGroup = document.getElementById('dot-group');
                dotGroup.innerHTML = '';
                if (aiTitles.length > 1) {
                    document.getElementById('title-switcher-ui').style.display = 'flex';
                    aiTitles.forEach((_, i) => {
                        const dot = document.createElement('div');
                        dot.className = `switch-dot ${i === 0 ? 'active' : ''}`;
                        dot.onclick = () => renderTitle(i);
                        dotGroup.appendChild(dot);
                    });
                } else {
                    document.getElementById('title-switcher-ui').style.display = 'none';
                }

                // 保存到历史记录
                saveHistory({
                    title: aiTitles[0],
                    body: data.body,
                    tags: data.tags,
                    topic: topic,
                    time: new Date().toLocaleString()
                });

            } catch (err) {
                console.error(err);
                alert('连接 AI 服务器失败，请检查网络或部署环境！');
            } finally {
                btn.classList.remove('loading');
                btn.innerHTML = '🚀 激发 AI 生成爆款';
            }
        }

        function renderTitle(index) {
            document.getElementById('preview-title').textContent = aiTitles[index];
            document.querySelectorAll('.switch-dot').forEach((d, i) => {
                d.classList.toggle('active', i === index);
            });
        }

        // --- 历史记录系统 ---
        function toggleHistorySidebar() {
            const sidebar = document.getElementById('history-sidebar');
            const body = document.body;
            sidebar.classList.toggle('active');
            body.classList.toggle('history-open');
        }

        function saveHistory(item) {
            let history = JSON.parse(localStorage.getItem('xhs_history') || '[]');
            history.unshift(item); // 最新在最前
            if (history.length > 10) history = history.slice(0, 10); // 只留10条
            localStorage.setItem('xhs_history', JSON.stringify(history));
            renderHistoryList();
        }

        function renderHistoryList() {
            const list = document.getElementById('history-list');
            const history = JSON.parse(localStorage.getItem('xhs_history') || '[]');

            if (history.length === 0) {
                list.innerHTML = '<div style="color: #999; font-size: 13px; text-align: center; padding: 20px;">暂无生成记录</div>';
                return;
            }

            list.innerHTML = history.map((item, index) => `
                <div class="history-item" onclick="loadHistory(${index})">
                    <div style="font-weight: 700; font-size: 13px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                        ${item.title}
                    </div>
                    <div style="font-size: 11px; color: #999;">${item.topic} · ${item.time}</div>
                </div>
            `).join('');
        }

        function loadHistory(index) {
            const history = JSON.parse(localStorage.getItem('xhs_history') || '[]');
            const item = history[index];
            if (!item) return;

            aiTitles = [item.title];
            document.getElementById('preview-title').textContent = item.title;
            document.getElementById('preview-body').textContent = item.body;
            document.getElementById('preview-tags').textContent = item.tags;
            document.getElementById('title-switcher-ui').style.display = 'none';
            alert('已恢复历史记录 ✨');
            toggleHistorySidebar(); // Close sidebar after loading
        }

        function clearHistory() {
            if (confirm('确认清空所有历史记录吗？')) {
                localStorage.removeItem('xhs_history');
                renderHistoryList();
            }
        }

        // 初始化加载
        window.onload = () => {
            renderHistoryList();
        };

        // 敏感词检测逻辑
        const blackList = ["第一", "最", "绝对", "100%", "暴利", "万能", "赚钱", "药到病除", "特效", "最贵", "赚钱项目"];

        function checkSensitiveWords() {
            const body = document.getElementById('preview-body').innerText;
            const title = document.getElementById('preview-title').innerText;
            const fullText = title + body;

            const discovered = blackList.filter(word => fullText.includes(word));
            const riskList = document.getElementById('risk-list');
            riskList.innerHTML = '';

            if (discovered.length > 0) {
                document.getElementById('sensitive-panel').classList.add('active');
                discovered.forEach(word => {
                    const span = document.createElement('span');
                    span.className = 'risk-item';
                    span.textContent = word;
                    riskList.appendChild(span);
                });
                alert(`检测到 ${discovered.length} 个敏感词，建议优化后再发布哦！`);
            } else {
                alert('✅ 状态良好，未检测到常见敏感词！可以直接发布。');
                document.getElementById('sensitive-panel').classList.remove('active');
            }
        }

        function copyContent(type) {
            let text = "";
            if (type === 'title') text = document.getElementById('preview-title').innerText;
            else {
                text = document.getElementById('preview-title').innerText + "\n\n" +
                    document.getElementById('preview-body').innerText + "\n\n" +
                    document.getElementById('preview-tags').innerText;
            }

            navigator.clipboard.writeText(text).then(() => alert('文案已复制到剪贴板！✨'));
        }
    </script>
</body>

</html>
