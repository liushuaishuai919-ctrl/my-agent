<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小红书爆款生成器 Pro Max - 超强 AI 文案神器</title>
    <meta name="description" content="专为小红书打造的 AI 爆款文案生成器。一键写出超有网感的干货分享、碎碎念、避雷避坑笔记。">
    <meta name="keywords" content="小红书, AI文案, 爆款标题, 自媒体工具, 文案助手, AI写作, 流量密码">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://my-first-agent.vercel.app/">
    <meta property="og:title" content="小红书爆款生成器 Pro Max - 你的私人自媒体专家">
    <meta property="og:description" content="3秒生成超强「网感」防限流笔记，Llama 3.3 强力驱动，让每一篇笔记都具备爆款潜力。">
    <meta property="og:image" content="/assets/og-image.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://my-first-agent.vercel.app/">
    <meta property="twitter:title" content="小红书爆款生成器 Pro Max">
    <meta property="twitter:description" content="AI 驱动的小红书爆款文案生成神器，助你轻松掌握流量密码。">
    <meta property="twitter:image" content="/assets/og-image.png">

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "小红书爆款生成器 Pro Max",
      "description": "专业级 AI 自媒体文案生成工具",
      "applicationCategory": "ProductivityApplication",
      "operatingSystem": "Web"
    }
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --primary-color: #FF2442;
            --pro-gold: #FFD700;
            --bg-gradient: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            --card-bg: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --glass-blur: blur(16px);
            --radius-lg: 24px;
            --radius-md: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', 'Noto Sans SC', sans-serif; background: var(--bg-gradient); background-attachment: fixed; color: var(--text-main); min-height: 100vh; overflow-x: hidden; }
        .particles { position: fixed; inset: 0; z-index: -1; background-image: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.05) 1px, transparent 1px); background-size: 40px 40px; }
        .layout-wrapper { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .trending-banner { display: flex; align-items: center; background: rgba(255,255,255,0.05); border: 1px solid var(--card-border); border-radius: 100px; padding: 10px 20px; margin-bottom: 30px; backdrop-filter: var(--glass-blur); }
        .trending-tag { background: var(--primary-color); color: white; padding: 4px 12px; border-radius: 50px; font-size: 12px; font-weight: 800; margin-right: 15px; }
        .trending-marquee { flex: 1; overflow: hidden; white-space: nowrap; }
        .trending-content { display: inline-block; animation: marquee 30s linear infinite; font-size: 13px; color: var(--text-muted); }
        .trending-item { cursor: pointer; transition: opacity 0.2s; }
        .trending-item:hover { opacity: 0.7; text-decoration: underline; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .logo-icon { width: 60px; height: 60px; background: var(--primary-color); border-radius: 18px; display: flex; align-items: center; justify-content: center; color: white; font-size: 32px; font-weight: 900; box-shadow: 0 10px 25px rgba(255,36,66,0.4); }
        .pro-badge { background: linear-gradient(90deg, #FFD700, #FFA500); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        .nav-btn { background: var(--card-bg); border: 1px solid var(--card-border); color: white; padding: 12px 24px; border-radius: 100px; cursor: pointer; font-weight: 700; backdrop-filter: var(--glass-blur); transition: 0.3s; }

        .container { display: grid; grid-template-columns: 1fr 420px; gap: 40px; }
        .glass-panel { background: var(--card-bg); border: 1px solid var(--card-border); backdrop-filter: var(--glass-blur); border-radius: var(--radius-lg); padding: 40px; box-shadow: 0 8px 32px rgba(0,0,0,0.37); }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 10px; font-weight: 700; color: var(--text-muted); font-size: 14px; }
        input[type="text"] { width: 100%; background: rgba(255,255,255,0.05); border: 1.5px solid var(--card-border); padding: 15px 18px; border-radius: 12px; color: white; font-size: 16px; outline: none; transition: 0.3s; }
        input[type="text"]:focus { border-color: var(--primary-color); box-shadow: 0 0 0 4px rgba(255,36,66,0.2); }
        
        .style-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .style-btn { padding: 15px 5px; background: rgba(255,255,255,0.03); border: 1px solid var(--card-border); border-radius: 12px; color: var(--text-muted); cursor: pointer; transition: 0.3s; font-size: 13px; font-weight: 700; }
        .style-btn.active { background: rgba(255,36,66,0.15); border-color: var(--primary-color); color: white; }
        
        .generate-btn { width: 100%; padding: 20px; background: var(--primary-color); color: white; border: none; border-radius: 16px; font-size: 18px; font-weight: 900; cursor: pointer; margin-top: 20px; box-shadow: 0 10px 25px rgba(255,36,66,0.3); transition: 0.3s; }
        .generate-btn:hover { transform: translateY(-3px); filter: brightness(1.1); }
        .generate-btn.loading { opacity: 0.7; pointer-events: none; }

        .phone-mockup { width: 375px; height: 760px; background: #000; border-radius: 54px; padding: 12px; position: relative; border: 1.5px solid rgba(255,255,255,0.1); box-shadow: 0 40px 100px rgba(0,0,0,0.5); }
        .phone-scroll { height: 100%; background: white; border-radius: 42px; overflow-y: auto; color: #333; }
        .phone-scroll::-webkit-scrollbar { width: 0; }
        .cover-img { width: 100%; height: 375px; object-fit: cover; }
        .post-content { padding: 20px; }
        .post-title { font-size: 19px; font-weight: 900; margin-bottom: 12px; color: #000; }
        .post-body { font-size: 15px; line-height: 1.7; white-space: pre-wrap; color: #444; }
        .post-tags { font-size: 14px; color: #135bb5; margin-top: 15px; font-weight: 700; }

        .sidebar { position: fixed; right: 0; top: 0; width: 400px; height: 100%; background: rgba(15,23,42,0.98); backdrop-filter: blur(25px); border-left: 1px solid var(--card-border); z-index: 1000; transform: translateX(100%); transition: 0.5s; padding: 40px; display: flex; flex-direction: column; }
        .sidebar.active { transform: translateX(0); }
        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; display: none; }
        .action-btn { padding: 12px; border-radius: 10px; border: 1px solid var(--card-border); background: transparent; color: white; cursor: pointer; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s; }
        .action-btn.primary { background: white; color: #0f172a; border: none; }
    </style>
</head>
<body>
    <div class="particles"></div>
    <div class="layout-wrapper">
        <div class="trending-banner">
            <span class="trending-tag">🔥 实时热榜</span>
            <div class="trending-marquee"><div class="trending-content" id="trending-marquee">加载中...</div></div>
        </div>
        <header class="header">
            <div class="logo-wrap"><div class="logo-icon">薯</div><div style="margin-left:15px"><h1>爆款生成器 <span class="pro-badge">Pro✨</span></h1><p style="color:var(--text-muted); font-size:14px">AI 驱动的爆款笔记专家</p></div></div>
            <button class="nav-btn" onclick="toggleSidebar()">🕜 收藏与分享</button>
        </header>
        <main class="container">
            <div class="glass-panel">
                <div class="form-group"><label>🎯 笔记主题</label><input type="text" id="topic" placeholder="输入你想写的主题..." onkeypress="if(event.key==='Enter')generate()"></div>
                <div class="form-group"><label>🎭 文案风格</label><div class="style-grid"><button class="style-btn active" onclick="sStyle(this,'sincere')">📚 纯干货</button><button class="style-btn" onclick="sStyle(this,'cute')">🧸 碎碎念</button><button class="style-btn" onclick="sStyle(this,'spicy')">⚡ 避雷针</button></div></div>
                <button class="generate-btn" id="gen-btn" onclick="generate()">🚀 一键生成 Pro 文案</button>
            </div>
            <div class="preview-wrapper">
                <div class="phone-mockup" id="target">
                    <div class="phone-scroll">
                        <img id="p-img" src="https://picsum.photos/seed/xhs/600/800" class="cover-img" alt="封面">
                        <div class="post-content"><div class="post-title" id="p-title" contenteditable="true">标题预览...</div><div class="post-body" id="p-body" contenteditable="true">正文预览...</div><div class="post-tags" id="p-tags" contenteditable="true">#小红书 #AI</div></div>
                    </div>
                </div>
                <button class="action-btn" style="width:100%; margin-top:20px" onclick="exportImg()">📸 导出高清长图</button>
            </div>
        </main>
    </div>
    <div class="sidebar-overlay" id="s-overlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <h2 style="margin-bottom:20px">🕜 常用工具</h2>
        <div style="flex:1"></div>
        <div style="border-top:1px solid var(--card-border); padding-top:20px">
            <p style="font-size:13px; color:var(--text-muted); margin-bottom:15px">🌟 自动推广与分享：</p>
            <div style="display:flex; gap:10px">
                <button class="action-btn primary" style="flex:1" onclick="share('copy')">🔗 复制链接</button>
                <button class="action-btn" style="flex:1" onclick="share('card')">📋 生成卡片</button>
            </div>
        </div>
    </div>
    <div id="toast" style="position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:white; color:#000; padding:12px 24px; border-radius:100px; display:none; z-index:2000; font-weight:800; box-shadow:0 10px 30px rgba(0,0,0,0.2)"></div>

    <script>
        let cStyle = 'sincere';
        function sStyle(b,s){ document.querySelectorAll('.style-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); cStyle=s; }
        function toggleSidebar(){ let s=document.getElementById('sidebar'); let o=document.getElementById('s-overlay'); s.classList.toggle('active'); o.style.display=s.classList.contains('active')?'block':'none'; }
        
        async function loadNews() {
            const m = document.getElementById('trending-marquee');
            const fb = ["如何快速涨粉", "小红书流量密码", "AI创作新风口", "职场新人必看"];
            try { 
                const res = await fetch('/api/news'); const data = await res.json();
                const items = data.items ? data.items.map(i=>i.title) : fb;
                const h = items.map(t=>`<span class="trending-item" onclick="document.getElementById('topic').value='${t}'"> &nbsp; 🔥 ${t} &nbsp; </span>`).join(' | ');
                m.innerHTML = h + h;
            } catch(e) { m.innerHTML = fb.map(t=>`<span class="trending-item" onclick="document.getElementById('topic').value='${t}'"> &nbsp; 🔥 ${t} &nbsp; </span>`).join(' | '); }
        }

        async function generate() {
            const t = document.getElementById('topic').value; if(!t) return alert('请输入主题');
            const b = document.getElementById('gen-btn'); b.classList.add('loading'); b.innerText='AI 思考中...';
            try {
                const res = await fetch('/api/generate', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({topic:t, style:cStyle}) });
                const d = await res.json();
                document.getElementById('p-title').innerText = d.title;
                document.getElementById('p-body').innerText = d.body;
                document.getElementById('p-tags').innerText = d.tags;
                document.getElementById('p-img').src = `https://picsum.photos/seed/${Math.random()}/600/800`;
            } catch(e) { alert('生成失败'); } finally { b.classList.remove('loading'); b.innerText='🚀 一键生成 Pro 文案'; }
        }

        async function exportImg() {
            const c = await html2canvas(document.getElementById('target'), {scale:2, useCORS:true});
            const l = document.createElement('a'); l.download=`小红书笔记_${Date.now()}.png`; l.href=c.toDataURL(); l.click();
        }

        function share(t) {
            if(t==='copy') { navigator.clipboard.writeText(`超强 AI 爆款生成器！\n${window.location.href}`).then(()=>alert('链接已复制')); }
            else { exportImg(); }
        }

        window.onload = () => { loadNews(); setInterval(loadNews, 600000); };
    </script>
</body>
</html>
